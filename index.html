<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>What's Your Crypto Persona? 🚀</title>
<meta name="description" content="Take the quiz to discover your true crypto identity. Are you a HODLer, a Degen, a Builder, or a No-Coiner? Share with friends!">
<meta property="og:title" content="What's Your Crypto Persona? 🚀">
<meta property="og:description" content="I got DEGEN APE 🦍 — what's your crypto persona?">
<meta property="og:type" content="website">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:linear-gradient(135deg,#0a0020,#150040,#0a0020);color:#e0d8ff;font-family:-apple-system,BlinkMacSystemFont,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1rem}
.container{max-width:550px;width:100%;text-align:center}
h1{font-size:2rem;background:linear-gradient(90deg,#f7931a,#ff6b35,#ff00ff,#14F195);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:1.5rem}
.progress{height:4px;background:#222;border-radius:2px;margin:1rem 0;overflow:hidden}
.progress-bar{height:100%;background:linear-gradient(90deg,#f7931a,#14F195);transition:width .3s}
.question{font-size:1.3rem;margin:1.5rem 0;min-height:60px}
.options{display:flex;flex-direction:column;gap:.6rem}
.option{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.15);padding:1rem;border-radius:12px;cursor:pointer;text-align:left;transition:all .2s;font-size:1rem}
.option:hover{background:rgba(255,255,255,0.1);border-color:#f7931a;transform:scale(1.02)}
.option.selected{background:rgba(247,147,26,0.2);border-color:#f7931a}
.result-card{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:2rem;margin:1rem 0;display:none}
.result-emoji{font-size:5rem;margin-bottom:.5rem}
.result-title{font-size:2rem;font-weight:700;margin:.5rem 0}
.result-desc{color:#aaa;margin:1rem 0;line-height:1.5}
.share-btn{display:inline-block;background:#1da1f2;color:#fff;padding:.8rem 2rem;border-radius:25px;text-decoration:none;font-weight:700;margin:.5rem;cursor:pointer;border:none;font-size:1rem}
.restart{background:#555;color:#fff;padding:.5rem 1.5rem;border-radius:20px;border:none;cursor:pointer;margin-top:1rem}
.tip-jar{margin-top:1.5rem;color:#555;font-size:.7rem}
.tip-jar code{color:#f7931a;font-size:.65rem}
.hidden{display:none}
</style>
</head>
<body>
<div class="container" id="quiz-container">
  <h1>🚀 What's Your Crypto Persona?</h1>
  <div class="progress"><div class="progress-bar" id="progress" style="width:0%"></div></div>
  <div class="question" id="question"></div>
  <div class="options" id="options"></div>
  <div id="question-num" style="color:#555;font-size:.8rem;margin-top:.5rem"></div>
</div>

<div class="container result-card" id="result-card">
  <div class="result-emoji" id="result-emoji"></div>
  <div class="result-title" id="result-title"></div>
  <div class="result-desc" id="result-desc"></div>
  <button class="share-btn" onclick="share()">📤 Share Your Result</button>
  <button class="restart" onclick="restart()">🔄 Retake Quiz</button>
  <div class="tip-jar">
    <p>Loved the quiz? Tips appreciated ❤️</p>
    <p>ETH: <code>0x286158debdEF01185E21E88847A87C5F6Dca8112</code></p>
    <p>SOL: <code>CPz4Pr8hM5ZoBq7VDXkMYtweEWEuqUFMDGsLdPHbknSG</code></p>
  </div>
</div>

<script>
const questions = [
  {q:"What do you do when crypto drops 40%?", o:["Buy more 🤑","Panic sell 😱","Tweet through it 🐦","Check in 6 months 😴"]},
  {q:"Pick your spirit animal:", o:["Wolf of Wall Street 🐺","Satoshi Nakamoto 🎭","Wojak 😢","Laser-eyed cat 😼"]},
  {q:"Your ideal Friday night:", o:["Scanning DEXs for gems 💎","Building the next big dApp 🔧","Arguing on Crypto Twitter 🍿","Touching grass 🌿"]},
  {q:"What's your portfolio strategy?", o:["All in one coin 🎰","50% BTC, 50% ETH 🏦","200 micro-cap tokens 🎪","What's a portfolio? 🧐"]},
  {q:"You find a 1000x gem. You:", o:["Ape all in immediately 🦍","Research for 2 hours first 📚","Tell nobody, buy quietly 🤫","Post about it after selling 📢"]},
];

const personas = {
  "🦍 DEGEN APE": {emoji:"🦍", desc:"You YOLO into every dip, eat crayons for breakfast, and check charts during funerals. 1000x or zero — you wouldn't have it any other way.", shares:"I'm a DEGEN APE 🦍"},
  "💎 DIAMOND HANDS": {emoji:"💎", desc:"You've held through 90% drawdowns and still haven't blinked. Your heirs will inherit your seed phrase. Legends speak of your conviction.", shares:"I'm DIAMOND HANDS 💎"},
  "🧠 CRYPTO WIZARD": {emoji:"🧠", desc:"You understand L2s, ZK-rollups, MEV, and yield optimization. People DM you for alpha. You quietly compound while others gamble.", shares:"I'm a CRYPTO WIZARD 🧠"},
  "🌿 NO-COINER": {emoji:"🌿", desc:"You're here because a friend sent this. You think Bitcoin is a scam but also kinda wish you bought at $100. You have better sleep than all of us.", shares:"I'm a NO-COINER 🌿"},
  "🐦 CRYPTO TWITTER FIEND": {emoji:"🐦", desc:"You've been ratio'd by CZ, blocked by more accounts than you follow, and your notifications haven't stopped since 2021. GM.", shares:"I'm a CRYPTO TWITTER FIEND 🐦"}
};

let answers = [];
let current = 0;

function showQuestion() {
  if (current >= questions.length) return showResult();
  const q = questions[current];
  document.getElementById('question').textContent = q.q;
  document.getElementById('options').innerHTML = q.o.map((o,i) => 
    `<div class="option" onclick="select(${i})">${o}</div>`).join('');
  document.getElementById('question-num').textContent = `${current+1}/${questions.length}`;
  document.getElementById('progress').style.width = `${(current/questions.length)*100}%`;
}

function select(i) {
  answers.push(i);
  document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
  document.querySelectorAll('.option')[i].classList.add('selected');
  current++;
  setTimeout(showQuestion, 300);
}

function showResult() {
  const score = answers.reduce((a,b) => a+b, 0);
  const keys = Object.keys(personas);
  const persona = personas[keys[score % keys.length]];
  
  document.getElementById('quiz-container').classList.add('hidden');
  document.getElementById('result-card').style.display = 'block';
  document.getElementById('result-emoji').textContent = persona.emoji;
  document.getElementById('result-title').textContent = keys[score % keys.length];
  document.getElementById('result-desc').textContent = persona.desc;
}

function share() {
  const keys = Object.keys(personas);
  const persona = personas[keys[answers.reduce((a,b)=>a+b,0) % keys.length]];
  const text = encodeURIComponent(`${persona.shares} — find your crypto persona at`);
  const url = encodeURIComponent(location.href);
  window.open(`https://twitter.com/intent/tweet?text=${text}&url=${url}`, '_blank');
}

function restart() {
  answers = []; current = 0;
  document.getElementById('quiz-container').classList.remove('hidden');
  document.getElementById('result-card').style.display = 'none';
  showQuestion();
}

showQuestion();
</script>
</body>
</html>
