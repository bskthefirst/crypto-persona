<script>
const questions = [
  {q:"What do you do when crypto drops 40%?", o:["Buy more 🤑","Panic sell 😱","Tweet through it 🐦","Check in 6 months 😴"]},
  {q:"Pick your spirit animal:", o:["Wolf of Wall Street 🐺","Satoshi Nakamoto 🎭","Wojak 😢","Laser-eyed cat 😼"]},
  {q:"Your ideal Friday night:", o:["Scanning DEXs for gems 💎","Building the next big dApp 🔧","Arguing on Crypto Twitter 🍿","Touching grass 🌿"]},
  {q:"What's your portfolio strategy?", o:["All in one coin 🎰","50% BTC, 50% ETH 🏦","200 micro-cap tokens 🎪","What's a portfolio? 🧐"]},
  {q:"You find a 1000x gem. You:", o:["Ape all in immediately 🦍","Research for 2 hours first 📚","Tell nobody, buy quietly 🤫","Post about it after selling 📢"]},
];

const personas = {
  "🦍 DEGEN APE": {emoji:"🦍", desc:"You YOLO into every dip, eat crayons for breakfast, and check charts during funerals. 1000x or zero — you wouldn't have it any other way."},
  "💎 DIAMOND HANDS": {emoji:"💎", desc:"You've held through 90% drawdowns and still haven't blinked. Your heirs will inherit your seed phrase. Legends speak of your conviction."},
  "🧠 CRYPTO WIZARD": {emoji:"🧠", desc:"You understand L2s, ZK-rollups, MEV, and yield optimization. People DM you for alpha. You quietly compound while others gamble."},
  "🌿 NO-COINER": {emoji:"🌿", desc:"You're here because a friend sent this. You think Bitcoin is a scam but also kinda wish you bought at $100. You have better sleep than all of us."},
  "🐦 CRYPTO TWITTER FIEND": {emoji:"🐦", desc:"You've been ratio'd by CZ, blocked by more accounts than you follow, and your notifications haven't stopped since 2021. GM."}
};

let answers=[], current=0;

function showQuestion(){
  if(current>=questions.length) return showResult();
  const q=questions[current];
  document.getElementById('question').textContent=q.q;
  document.getElementById('options').innerHTML=q.o.map((o,i)=>`<div class="option" onclick="select(${i})">${o}</div>`).join('');
  document.getElementById('question-num').textContent=`${current+1}/${questions.length}`;
  document.getElementById('progress').style.width=`${(current/questions.length)*100}%`;
}

function select(i){
  answers.push(i);
  document.querySelectorAll('.option').forEach(o=>o.classList.remove('selected'));
  document.querySelectorAll('.option')[i].classList.add('selected');
  current++;
  setTimeout(showQuestion,250);
}

function showResult(){
  const score=answers.reduce((a,b)=>a+b,0);
  const keys=Object.keys(personas);
  const persona=personas[keys[score%keys.length]];
  document.getElementById('quiz-container').classList.add('hidden');
  document.getElementById('result-card').style.display='block';
  document.getElementById('result-emoji').textContent=persona.emoji;
  document.getElementById('result-title').textContent=keys[score%keys.length];
  document.getElementById('result-desc').textContent=persona.desc;
}

function share(){
  const score=answers.reduce((a,b)=>a+b,0);
  const keys=Object.keys(personas);
  const p=personas[keys[score%keys.length]];
  const text=encodeURIComponent(`I'm ${keys[score%keys.length]} ${p.emoji} — discover your crypto persona:`);
  window.open(`https://twitter.com/intent/tweet?text=${text}&url=${encodeURIComponent(location.href)}`,'_blank');
}

function restart(){answers=[];current=0;document.getElementById('quiz-container').classList.remove('hidden');document.getElementById('result-card').style.display='none';showQuestion();}

showQuestion();
</script>
</body>
